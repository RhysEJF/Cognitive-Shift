name: Flow OS
tagline: "Your AI operating system: code and training, intertwined"
description: >-
  In a world where AI can write code, the code itself isn't the value.
  The value is in augmenting you. Flow OS is a complete AI operating
  system that compounds knowledge with every project, paired with
  hands-on training to make it yours. Not slides. Infrastructure
  that makes you more capable.
features:
  - A complete Flow OS setup, ready to be tailored to your work and context as you grow
  - Out-of-the-box integrations that extend Claude Code, plus a safe layer to add new ones
  - A full day of hands-on onboarding where we configure everything, test it, and build your first skill together
  - Training on the core system, commands, and workflow patterns
  - Ongoing Q&A throughout the training day (which can be spread across multiple days) building skills, setting up integrations, and tailoring your OS to fit your needs
format: One-time setup + optional monthly subscription tiers.
idealFor: >-
  Solo operators, founders, and managers who want an AI-powered operating
  system that handles most of their tasks and grows with them.
pricingLabel: "€2,000"
pricingDetail: One-time setup + onboarding day
